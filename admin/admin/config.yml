backend:
  name: github
  repo: your-username/your-repo-name

media_folder: "assets"
public_folder: "/assets"

collections:
  - name: "blog"
    label: "المقالات"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "العنوان", name: "title", widget: "string"}
      - {label: "تاريخ النشر", name: "date", widget: "datetime"}
      - {label: "المحتوى", name: "body", widget: "markdown"}
